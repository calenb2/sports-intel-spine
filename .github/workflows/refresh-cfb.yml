name: refresh-cfb

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 10 * * *"   # nightly in season

concurrency:
  group: spine-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Distill
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: python scripts/distill_cfb.py
      - name: Completeness guard
        run: |
          python - <<'PY'
          import json, sys
          m = json.load(open("distillates/cfb/meta.json"))
          print(m)
          if m["teams_profiled"] < 120: sys.exit("expected >= 120 teams for cfb")
          PY
      - name: Commit
        run: |
          git config user.name "spine-bot"
          git config user.email "spine-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refresh: cfb distillates $(date -u +%F)"
          git pull --rebase origin main
          git push || (git pull --rebase origin main && git push)
