name: refresh-nhl

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 9 * * *"

concurrency:
  group: spine-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Distill
        run: python scripts/distill_nhl.py
      - name: Completeness guard
        run: |
          python - <<'PY'
          import json, sys
          m = json.load(open("distillates/nhl/meta.json"))
          print(m)
          if m["teams_profiled"] < 32: sys.exit("expected >= 32 teams for nhl")
          PY
      - name: Commit
        run: |
          git config user.name "spine-bot"
          git config user.email "spine-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refresh: nhl distillates $(date -u +%F)"
          git pull --rebase origin main
          git push || (git pull --rebase origin main && git push)
