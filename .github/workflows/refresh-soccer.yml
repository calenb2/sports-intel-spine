name: refresh-soccer

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 5,11,17,23 * * *"   # 4x daily during the World Cup; relax to daily after the final

concurrency:
  group: spine-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Pull raw sources (martj42 international results)
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/martj42/international_results"
          for BR in master main; do
            if curl -fsSL -o data/soccer/raw/results.csv "$BASE/$BR/results.csv"; then
              echo "pulled results.csv from $BR"; break
            fi
          done
          test -s data/soccer/raw/results.csv
          curl -fsSL -o data/soccer/raw/shootouts.csv "$BASE/master/shootouts.csv" \
            || curl -fsSL -o data/soccer/raw/shootouts.csv "$BASE/main/shootouts.csv" \
            || echo "shootouts.csv unavailable - continuing"

      - name: Distill
        run: python scripts/distill_soccer.py

      - name: Freshness guard (fail loudly if upstream stalls)
        run: |
          python - <<'PY'
          import json, sys
          from datetime import date
          m = json.load(open("distillates/soccer/meta.json"))
          lag = (date.today() - date.fromisoformat(m["data_through"])).days
          print(f"data_through={m['data_through']} lag={lag}d")
          if lag > 3:
              sys.exit(f"STALE: upstream results lag {lag} days - investigate source")
          PY

      - name: Commit refreshed distillates
        run: |
          git config user.name "spine-bot"
          git config user.email "spine-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refresh: soccer distillates $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push || (git pull --rebase origin main && git push)
