name: refresh-soccer-clubs
on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 10 * * 1"   # weekly until Aug; bump to nightly when 2627 season starts
permissions: { contents: write }
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Distill
        run: python scripts/distill_soccer_clubs.py
      - name: Completeness guard
        run: |
          python - <<'PY'
          import json, sys
          m = json.load(open("distillates/soccer_clubs/meta.json"))
          print(m)
          if m["teams_profiled"] < 90: sys.exit("expected 100+ club teams across 6 leagues")
          PY
      - name: Commit
        run: |
          git config user.name "spine-bot"; git config user.email "spine-bot@users.noreply.github.com"
          git add -A; git diff --cached --quiet || git commit -m "refresh: soccer club distillates $(date -u +%F)"; git push
