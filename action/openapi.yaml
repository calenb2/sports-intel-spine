# Paste into: GPT Builder -> Configure -> Actions -> Import schema
# Ready as-is (owner: calenb2). Auth: None (public repo).
openapi: 3.1.0
info:
  title: Sports Intel Spine
  description: Rolling distillates and postmortem stats for Sports GPT Guru V5. One call per run.
  version: "1.0"
servers:
  - url: https://raw.githubusercontent.com/calenb2/sports-intel-spine/main
paths:
  /distillates/soccer/team_profiles.json:
    get:
      operationId: getSoccerTeamProfiles
      summary: Rolling 4-year profiles for all national teams (single fetch covers a whole slate)
      description: Returns as_of, data_through, and per-team form/Elo. Echo data vintage in Block 2.
      responses:
        "200":
          description: JSON object keyed by team name
  /distillates/soccer/wc_base_rates.json:
    get:
      operationId: getWorldCupBaseRates
      summary: World Cup reference-class base rates (all-time and recent editions)
      responses:
        "200":
          description: Base-rate JSON with caveats
  /distillates/soccer/meta.json:
    get:
      operationId: getSoccerDataVintage
      summary: Data vintage and provenance check (call if staleness is suspected)
      responses:
        "200":
          description: Meta JSON with as_of and data_through
